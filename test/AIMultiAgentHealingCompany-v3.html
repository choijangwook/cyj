<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI Multi Agent Healing Company v3</title>
    <style>
        body {
            /* PC 메모장과 동일한 글꼴 세팅 (Consolas는 영문 메모장 폰트, 맑은 고딕은 한글용) */
            font-family: 'Consolas', 'Courier New', '맑은 고딕', sans-serif;
            background-color: #ffffff;
            color: #000000;
            padding: 25px;
            
            /* 원하시는 대로 글자 크기를 시원하게 조절 가능 (기본 메모장보다 살짝 큰 17px 세팅) */
            font-size: 17px; 
            
            /* 줄 간격 격차를 주어 가독성을 높임 */
            line-height: 1.6;
            
            /* [핵심] 화면 크기에 맞춰 글자가 알아서 내려가는 '자동 줄 바꿈' 활성화 */
            white-space: pre-wrap; 
            word-break: break-all;
        }
    </style>
</head>
<body>여기에 메모장에 들어갈 실제 본문 내용을 적으세요.

글을 아무리 길게 써도 우측 끝에서 잘리지 않고, 
PC 메모장에서 '자동 줄 바꿈'을 켠 것처럼 브라우저 창 크기에 맞춰 예쁘게 줄 바꿈이 됩니다.

엔터(줄바꿈)나 띄어쓰기(공백)도 메모장에 쓴 그대로 똑같이 유지됩니다.
앞으로 내용을 수정하실 때도 이 영역의 글자만 고쳐서 저장하시면 됩니다.</body>
</html>
